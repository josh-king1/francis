<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EPIMS - Login</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
body{
    font-family:'Poppins', sans-serif;
    height:100vh;
    background: linear-gradient(135deg,#0d6efd,#1e3c72);
    display:flex;
    align-items:center;
    justify-content:center;
}

.login-card{
    background:rgba(255,255,255,0.95);
    backdrop-filter:blur(10px);
    padding:40px;
    border-radius:25px;
    width:100%;
    max-width:400px;
    box-shadow:0 20px 50px rgba(0,0,0,0.2);
}

.login-card h3{
    font-weight:700;
    text-align:center;
    margin-bottom:30px;
}

.form-control{
    border-radius:50px;
    padding:12px 20px;
}

.btn-login{
    border-radius:50px;
    padding:12px;
    font-weight:600;
    background:#0d6efd;
    color:white;
}

.btn-login:hover{
    background:#0b5ed7;
}

.error-msg{
    color:red;
    font-size:14px;
    text-align:center;
    margin-top:10px;
}

.footer-text{
    text-align:center;
    font-size:13px;
    margin-top:20px;
    color:#666;
}
</style>
</head>
<body>

<div class="login-card">
    <h3>EPIMS Login</h3>

    <form onsubmit="return loginUser()">
        <div class="mb-3">
            <input type="text" id="username" class="form-control" placeholder="Username" required>
        </div>

        <!-- Password is normal text for demonstration -->
        <div class="mb-3">
            <input type="text" id="password" class="form-control" placeholder="Password" required>
        </div>

        <a href="home.html" class="btn btn-login w-100">Login</a>

        <div id="error" class="error-msg"></div>
    </form>

    <div class="footer-text">
        Engineering Project Implementation System
    </div>
</div>

<script>
function loginUser(){

    // HARDCODED CREDENTIALS
    const correctUsername = "admin";
    const correctPassword = "12345";

    let username = document.getElementById("username").value;
    let password = document.getElementById("password").value;

    if(username === correctUsername && password === correctPassword){
        
        alert("Login Successful!");
        
        // Redirect to dashboard
        window.location.href = "dashboard.html";
        return false;
    }else{
        document.getElementById("error").innerText = "Invalid Username or Password";
        return false;
    }
}
</script>

</body>
</html>
