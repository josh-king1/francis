<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transaction Status - EPIMS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background: #f4f7fe; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .status-card { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); max-width: 500px; width: 100%; text-align: center; }
        .success-icon { font-size: 60px; color: #198754; margin-bottom: 20px; }
        .receipt-details { background: #f8f9fa; border-radius: 10px; padding: 20px; text-align: left; margin: 20px 0; }
        .detail-row { display: flex; justify-content: space-between; margin-bottom: 10px; border-bottom: 1px dashed #ddd; padding-bottom: 5px; }
        .detail-label { color: #777; font-size: 14px; }
        .detail-value { font-weight: 600; color: #333; }
    </style>
</head>
<body>

    <div class="status-card">
        <div class="success-icon">Checkmark ✅</div>
        <h3 class="fw-bold">Payment Successful!</h3>
        <p class="text-muted">Your engineer has been successfully assigned to the project.</p>

        <div class="receipt-details">
            <div class="detail-row">
                <span class="detail-label">Engineer</span>
                <span class="detail-value" id="res-engineer">---</span>
            </div>
            <div class="detail-row">
                <span class="detail-label">Amount Paid</span>
                <span class="detail-value" id="res-amount">₦0.00</span>
            </div>
            <div class="detail-row">
                <span class="detail-label">Ref Number</span>
                <span class="detail-value" id="res-ref">---</span>
            </div>
            <div class="detail-row">
                <span class="detail-label">Status</span>
                <span class="detail-value text-success">Verified</span>
            </div>
        </div>

        <a href="workflow.html" class="btn btn-primary w-100 rounded-pill fw-bold">Return to Workflow</a>
    </div>

    <script>
        // Function to get data from the URL
        const urlParams = new URLSearchParams(window.location.search);
        const reference = urlParams.get('ref');
        const amount = urlParams.get('amount');
        const engineer = urlParams.get('engineer');

        // Populate the page with data
        if (reference) {
            document.getElementById('res-ref').innerText = reference;
            document.getElementById('res-amount').innerText = "₦" + parseInt(amount).toLocaleString();
            document.getElementById('res-engineer').innerText = decodeURIComponent(engineer);
        } else {
            // If someone tries to visit the page directly without paying
            document.querySelector('.status-card').innerHTML = "<h3>No Transaction Found</h3><br><a href='workflow.html' class='btn btn-secondary'>Go Back</a>";
        }
    </script>
</body>
</html>
