<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EPIMS - ATM/Card Payment Demo</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
body{
    margin:0;
    font-family:'Poppins',sans-serif;
    background: linear-gradient(135deg,#0d6efd,#1e3c72);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.payment-card{
    background: rgba(255,255,255,0.95);
    padding: 40px 30px;
    border-radius: 25px;
    max-width: 400px;
    width: 100%;
    box-shadow:0 25px 60px rgba(0,0,0,0.25);
    animation:fadeIn 0.8s ease-in-out;
}

.payment-card h3{
    text-align:center;
    margin-bottom:30px;
    font-weight:700;
}

.form-group{
    margin-bottom:20px;
}

label{
    display:block;
    font-weight:500;
    margin-bottom:5px;
    color:#555;
}

input{
    width:100%;
    padding:12px 15px;
    border-radius:50px;
    border:1px solid #ccc;
    outline:none;
    font-size:14px;
}

input:focus{
    border-color:#0d6efd;
}

.btn-pay{
    width:100%;
    padding:12px;
    background:#0d6efd;
    color:white;
    font-weight:600;
    border:none;
    border-radius:50px;
    cursor:pointer;
    transition:0.3s;
    font-size:16px;
}

.btn-pay:hover{
    background:#0b5ed7;
}

.card-icons{
    display:flex;
    justify-content:flex-end;
    margin-bottom:15px;
}

.card-icons img{
    width:50px;
    margin-left:10px;
}

@keyframes fadeIn{
    from{opacity:0; transform:translateY(20px);}
    to{opacity:1; transform:translateY(0);}
}

.success-msg{
    display:none;
    text-align:center;
    margin-top:20px;
    font-weight:600;
    color:#198754;
}

</style>
</head>
<body>

<div class="payment-card">
    <h3>ATM / Card Payment</h3>

    <div class="card-icons">
        <img src="https://upload.wikimedia.org/wikipedia/commons/0/04/Visa.svg" alt="Visa">
        <img src="https://upload.wikimedia.org/wikipedia/commons/0/0e/Mastercard-logo.png" alt="Mastercard">
    </div>

    <form id="cardPaymentForm">
        <div class="form-group">
            <label>Cardholder Name</label>
            <input type="text" id="cardName" placeholder="Full Name" required>
        </div>

        <div class="form-group">
            <label>Card Number</label>
            <input type="text" id="cardNumber" placeholder="XXXX-XXXX-XXXX-XXXX" maxlength="19" required>
        </div>

        <div class="form-group">
            <label>Expiry Date</label>
            <input type="text" id="expiry" placeholder="MM/YY" maxlength="5" required>
        </div>

        <div class="form-group">
            <label>CVV</label>
            <input type="text" id="cvv" placeholder="XXX" maxlength="3" required>
        </div>

        <div class="form-group">
            <label>Amount (₦)</label>
            <input type="number" id="amount" placeholder="Enter Amount" required>
        </div>

        <button type="submit" class="btn-pay">Pay Now</button>
    </form>

    <div class="success-msg" id="successMsg">Payment Successful! ✅</div>
</div>

<script>
const form = document.getElementById("cardPaymentForm");
const successMsg = document.getElementById("successMsg");

form.addEventListener("submit", function(e){
    e.preventDefault();

    // Basic simulation of payment success
    successMsg.style.display = "block";
    form.reset();

    // Optional: Hide success after 5 seconds
    setTimeout(() => {
        successMsg.style.display = "none";
    }, 5000);
});
</script>

</body>
</html>
