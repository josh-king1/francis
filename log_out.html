<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logout Successful - EPIMS</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            height: 100vh;
            background: linear-gradient(135deg, #0d6efd, #1e3c72);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Glass Card */
        .logout-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 50px 40px;
            border-radius: 30px;
            width: 100%;
            max-width: 450px;
            text-align: center;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.25);
            animation: fadeIn 0.8s ease-in-out;
        }

        /* Success Circle */
        .success-icon {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            background: #198754;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            animation: pop 0.6s ease;
        }

        .success-icon svg {
            width: 45px;
            height: 45px;
            color: white;
        }

        h3 {
            font-weight: 700;
            margin-bottom: 15px;
        }

        p {
            color: #6c757d;
        }

        .btn-home {
            margin-top: 20px;
            border-radius: 50px;
            padding: 12px 30px;
            font-weight: 600;
        }

        .countdown {
            margin-top: 15px;
            font-size: 14px;
            color: #888;
        }

        /* Animations */
        @keyframes pop {
            0% {
                transform: scale(0);
            }

            100% {
                transform: scale(1);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>

    <div class="logout-card">

        <div class="success-icon">
            <!-- Check Icon -->
            <svg fill="currentColor" viewBox="0 0 16 16">
                <path
                    d="M13.485 1.929a1 1 0 0 1 0 1.414L6.414 10.414a1 1 0 0 1-1.414 0L2.515 7.929a1 1 0 1 1 1.414-1.414L5.707 8.293l6.364-6.364a1 1 0 0 1 1.414 0z" />
            </svg>
        </div>

        <h3>Logout Successful</h3>
        <p>You have been securely logged out of EPIMS.</p>

        <a href="login.html" class="btn btn-primary btn-home">Return to Login</a>

        <div class="countdown">
            Redirecting in <span id="timer">5</span> seconds...
        </div>

    </div>

    <script>
        let timeLeft = 5;
        let timerElement = document.getElementById("timer");

        let countdown = setInterval(function () {
            timeLeft--;
            timerElement.textContent = timeLeft;

            if (timeLeft <= 0) {
                clearInterval(countdown);
                window.location.href = "login.html";
            }
        }, 1000);
    </script>

</body>

</html>
